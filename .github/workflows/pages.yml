name: Deploy Skill Radar to Pages

on:
  push:
    branches: ["main"]
    paths:
      - "assets/dashboard/index.html"
      - "assets/dashboard/styles.css"
      - "assets/dashboard/app.js"
      - "assets/dashboard/data/current.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare public site
        run: |
          mkdir -p _site/data
          cp assets/dashboard/index.html _site/
          cp assets/dashboard/styles.css _site/
          cp assets/dashboard/app.js _site/
          cp assets/dashboard/data/current.json _site/data/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
