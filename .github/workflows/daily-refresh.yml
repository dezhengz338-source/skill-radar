name: Daily Skill Radar refresh

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: skill-radar-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Scan public Skill sources
        env:
          GITHUB_TOKEN: ${{ secrets.RADAR_GITHUB_TOKEN || github.token }}
        run: python assets/dashboard/server.py --refresh-only
      - name: Commit the current snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/dashboard/data/current.json
          if git diff --cached --quiet; then
            echo "No snapshot change"
          else
            git commit -m "chore: refresh skill radar"
            git push
          fi
